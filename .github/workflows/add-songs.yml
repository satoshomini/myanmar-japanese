name: Add Songs

on:
  workflow_dispatch:

jobs:
  add-songs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci

      - name: Fetch subtitles + LRC + generate romaji
        run: python3 scripts/fetch_songs.py

      - name: Generate romaji and update subtitles.ts
        run: node scripts/add_romaji.js

      - name: Build check
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/subtitles.ts
          git diff --staged --quiet || git commit -m "Add songs via GitHub Actions"
          git push
